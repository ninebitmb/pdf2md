name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: harbor.ninebit.lt
  IMAGE: harbor.ninebit.lt/pdf2md-converter/converter

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run python -c "from app.converter import extract_raw; print('imports ok')"

  build:
    runs-on: [self-hosted, ninebit]
    needs: [test]
    if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:main-${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/cache/pdf2md-converter:prod
          cache-to: type=registry,ref=${{ env.REGISTRY }}/cache/pdf2md-converter:prod,mode=max

  deploy:
    runs-on: [self-hosted, ninebit]
    needs: [build]
    steps:
      - name: Deploy to Dokploy
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://dokploy.ninebit.lt/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_APP_ID }}"}')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP: ${http_code} ${body}"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Dokploy deployment failed"
            exit 1
          fi
